{% extends "base.html" %}

{% block content %}

<div class="hero">

    <h1>🔐 Login</h1>

    <p>Welcome back to ChemAI.</p>

</div>

<div class="card">

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Username or Email"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">

            🔓 Login

        </button>

    </form>

</div>

{% if message %}

<div class="card">

    <h2>{{ message }}</h2>

</div>

{% endif %}

{% endblock %}
