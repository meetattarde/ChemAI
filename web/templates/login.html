{% extends "base.html" %}

{% block content %}

<head><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <div class="hero">

    <h1>🧪 Create Account</h1>

    <p>Start your chemistry journey with ChemAI.</p>

</div>
</head>

<div class="hero">

    <h1>🔐 Login</h1>

    <p>Welcome back to ChemAI.</p>

</div>

<div class="login-container">
    </div class="login-card">

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Username or Email"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">

            🔓 Login

        </button>

    </form>

     </div>
</div>

{% if message %}

<div class="card">

    <h2>{{ message }}</h2>

</div>

{% endif %}

{% endblock %}
