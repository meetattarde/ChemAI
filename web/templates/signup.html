{% extends "base.html" %}

{% block content %}

<div class="hero">

    <h1>🧪 Join ChemAI</h1>

    <p>Create your free ChemAI account.</p>

</div>

<div class="card">

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required>

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required>

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">

            🚀 Create Account

        </button>

    </form>

</div>

{% if message %}

<div class="card">

    <h2>{{ message }}</h2>

</div>

{% endif %}

{% endblock %}
